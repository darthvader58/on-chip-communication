<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #111827; }
      .label { font: 600 16px Arial, sans-serif; fill: #111827; }
      .body { font: 14px Arial, sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #2563eb; stroke-width: 2.5; rx: 18; ry: 18; }
      .line { stroke: #1f2937; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #1f2937; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .note { font: 13px Arial, sans-serif; fill: #4b5563; }
    </style>
  </defs>

  <text x="40" y="42" class="title">UART Transmit and Receive FSM</text>

  <rect x="60" y="110" width="180" height="92" class="box"/>
  <text x="120" y="142" class="label">IDLE</text>
  <text x="88" y="168" class="body">Wait for start bit</text>
  <text x="96" y="188" class="body">TX holds line high</text>

  <rect x="290" y="110" width="180" height="92" class="box"/>
  <text x="336" y="142" class="label">START</text>
  <text x="320" y="168" class="body">Drive/sample start bit</text>
  <text x="330" y="188" class="body">One bit period</text>

  <rect x="520" y="110" width="180" height="92" class="box"/>
  <text x="576" y="142" class="label">DATA</text>
  <text x="554" y="168" class="body">Shift or sample</text>
  <text x="560" y="188" class="body">8 data bits</text>

  <rect x="750" y="110" width="180" height="92" class="box"/>
  <text x="800" y="142" class="label">STOP</text>
  <text x="784" y="168" class="body">Stop bit interval</text>
  <text x="780" y="188" class="body">Assert done/valid</text>

  <path d="M240 156 L290 156" class="line"/>
  <text x="250" y="146" class="note">start detected</text>

  <path d="M470 156 L520 156" class="line"/>
  <text x="488" y="146" class="note">half/full bit confirm</text>

  <path d="M700 156 L750 156" class="line"/>
  <text x="712" y="146" class="note">after 8 bits</text>

  <path d="M840 202 L840 258 L150 258 L150 202" class="loop"/>
  <text x="446" y="248" class="note">frame complete</text>

  <path d="M610 202 L610 282 L610 318 L610 202" class="loop"/>
  <text x="628" y="282" class="note">repeat until bit count = 8</text>

  <rect x="110" y="310" width="760" height="58" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5" rx="14" ry="14"/>
  <text x="138" y="336" class="body">Same four-state flow applies to both modules:</text>
  <text x="138" y="356" class="body">TX uses IDLE -> START -> DATA -> STOP to transmit a frame. RX uses the same progression to detect, sample, and validate one frame.</text>
</svg>
